services:
  rss-fulltext:
    image: ghcr.io/mijndert/rss-fulltext:latest
    container_name: rss-fulltext
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      CONFIG_PATH: "/etc/rss-fulltext/feeds.yaml"
      OUTPUT_DIR: "/var/lib/rss-fulltext/feeds"
      CACHE_DIR: "/var/lib/rss-fulltext/cache"
      CACHE_TTL: "24h"
      JANITOR_INTERVAL: "1h"
      CONCURRENCY: "4"
      REQUEST_TIMEOUT: "20s"
      READ_TIMEOUT: "30s"
      WRITE_TIMEOUT: "30s"
      FEED_TIMEOUT: "5m"
      MAX_ARTICLE_BYTES: "5242880"
      MAX_FEED_BYTES: "4194304"
      MAX_ITEMS_PER_FEED: "50"
      USER_AGENT: "rss-fulltext/2.0"
      ALLOW_PRIVATE_ADDRESSES: "false"
    volumes:
      - ./feeds.yaml:/etc/rss-fulltext/feeds.yaml:ro
      - data:/var/lib/rss-fulltext
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  data:
